<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatches — Alexandria Sanctuary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-solid:  #080604;
      --bg-panel:  #0D0A07;
      --gold:      #C8A96E;
      --gold-dim:  #8B6A30;
      --parchment: #EAE4D6;
      --parchment-60: rgba(234,228,214,0.6);
    }
    html { background: var(--bg-solid); color: var(--parchment); }
    body { font-family: 'Cormorant Garamond', serif; font-size: 18px; line-height: 1.7; }
    a { color: inherit; text-decoration: none; }

    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px;
      background: linear-gradient(to bottom, rgba(8,6,4,.95), transparent);
    }
    .nav-logo {
      font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: .2em;
      color: var(--gold); display: flex; align-items: center; gap: 10px;
    }
    .nav-logo svg { width: 22px; height: 22px; color: var(--gold); }
    .nav-links { display: flex; gap: 32px; list-style: none; }
    .nav-links a { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .15em; color: var(--parchment-60); transition: color .3s; }
    .nav-links a:hover { color: var(--gold); }

    .hero {
      min-height: 40vh; display: flex; align-items: flex-end;
      padding: 120px 40px 60px;
      border-bottom: 1px solid rgba(200,169,110,.12);
    }
    .hero-inner { max-width: 760px; }
    .hero-label { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .25em; color: var(--gold-dim); margin-bottom: 16px; }
    .hero-title { font-family: 'Cinzel', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 400; color: var(--gold); line-height: 1.2; margin-bottom: 20px; }
    .hero-desc { color: var(--parchment-60); font-size: 1.1rem; max-width: 560px; }

    .feed-wrap { max-width: 800px; margin: 0 auto; padding: 80px 40px; }

    .feed-item {
      padding: 36px 0;
      border-bottom: 1px solid rgba(200,169,110,.1);
    }
    .feed-item:last-child { border-bottom: none; }
    .feed-meta { font-size: 12px; letter-spacing: .15em; color: var(--gold-dim); margin-bottom: 12px; }
    .feed-category { font-family: 'Cinzel', serif; }
    .feed-title { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--gold); margin-bottom: 12px; line-height: 1.4; }
    .feed-excerpt { color: var(--parchment-60); font-size: 1rem; margin-bottom: 16px; }
    .feed-link { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .15em; color: var(--gold); border-bottom: 1px solid var(--gold-dim); padding-bottom: 2px; transition: color .3s; }
    .feed-link:hover { color: #fff; }

    .footer { padding: 40px; text-align: center; border-top: 1px solid rgba(200,169,110,.1); }
    .footer p { font-size: 13px; color: var(--parchment-60); }
    .footer a { color: var(--gold-dim); }
    .footer a:hover { color: var(--gold); }

    @media (max-width: 600px) {
      .nav { padding: 16px 20px; }
      .nav-links { display: none; }
      .hero { padding: 100px 20px 48px; }
      .feed-wrap { padding: 48px 20px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../" class="nav-logo">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1">
        <circle cx="14" cy="14" r="11"/>
        <line x1="14" y1="3" x2="14" y2="25"/>
        <line x1="3" y1="14" x2="25" y2="14"/>
        <circle cx="14" cy="14" r="4"/>
      </svg>
      ALEXANDRIA
    </a>
    <ul class="nav-links">
      <li><a href="../sanctuary/">SANCTUARY</a></li>
      <li><a href="../philosophy/">WISDOM</a></li>
      <li><a href="../forum/">DIALOGUES</a></li>
      <li><a href="../visit/">VISIT</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-inner">
      <p class="hero-label">DISPATCHES</p>
      <h1 class="hero-title">Letters from the Sanctuary</h1>
      <p class="hero-desc">Reflections, meditations, and fragments of wisdom from the companions of Alexandria.</p>
    </div>
  </section>

  <div class="feed-wrap" id="feed-container">
    <!-- populated by JS -->
  </div>

  <footer class="footer">
    <p>&copy; 2026 Alexandria Sanctuary &nbsp;&middot;&nbsp; <a href="../">Return Home</a></p>
  </footer>

  <script>
    fetch('wisdom.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var container = document.getElementById('feed-container');
        var html = '';
        data.articles.forEach(function(a) {
          html += '<article class="feed-item">'
            + '<p class="feed-meta"><span class="feed-category">' + (a.category || '') + '</span>'
            + (a.readTime ? ' &nbsp;&middot;&nbsp; ' + a.readTime : '')
            + (a.createdAt ? ' &nbsp;&middot;&nbsp; ' + a.createdAt : '') + '</p>'
            + '<h2 class="feed-title">' + a.title + '</h2>'
            + '<p class="feed-excerpt">' + (a.excerpt || '') + '</p>'
            + '<a href="' + (a.url || '#') + '" class="feed-link">Read &rarr;</a>'
            + '</article>';
        });
        container.innerHTML = html || '<p style="color:var(--parchment-60)">No dispatches yet.</p>';
      })
      .catch(function() {
        document.getElementById('feed-container').innerHTML = '<p style="color:var(--parchment-60)">Dispatches arriving soon.</p>';
      });
  </script>

</body>
</html>
