<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALEXANDRIA-SANCTUARY Staff</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#f5f5f5; font-family:system-ui; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.gate { text-align:center; }
.gate h1 { color:#D4AF37; margin-bottom:1rem; }
.gate input { background:#1a1a1a; border:1px solid #333; color:#f5f5f5; padding:12px; font-size:1.2rem; letter-spacing:8px; text-align:center; width:200px; border-radius:8px; }
.gate input:focus { border-color:#D4AF37; outline:none; }
.portal { display:none; padding:2rem; }
.portal h2 { color:#D4AF37; margin-bottom:1rem; }
</style>
</head>
<body>
<div class="gate" id="gate">
  <h1>STAFF PORTAL</h1>
  <p style="margin-bottom:1rem;color:#888">스태프 인증</p>
  <input type="text" id="pw" inputmode="numeric" placeholder="••••" maxlength="4">
</div>
<div class="portal" id="portal">
  <h2>Alexandria Sanctuary — Staff</h2>
  <p>관리 포털</p>
</div>
<script>
const KEY='alexandria_staff_auth';
if(localStorage.getItem(KEY)==='1'){document.getElementById('gate').style.display='none';document.getElementById('portal').style.display='block';}
document.getElementById('pw').addEventListener('input',function(){if(this.value==='1126'){localStorage.setItem(KEY,'1');document.getElementById('gate').style.display='none';document.getElementById('portal').style.display='block';}});
</script>
</body>
</html>
