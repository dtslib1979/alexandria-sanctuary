<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexandria Sanctuary — Branch Card</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: linear-gradient(135deg, #16213e, #0f3460);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
        }
        .card h1 {
            font-size: 1.6rem;
            color: #e94560;
            margin-bottom: 8px;
        }
        .card .tagline {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 24px;
        }
        .card .info {
            text-align: left;
            margin: 20px 0;
        }
        .card .info div {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
        }
        .card .info span {
            color: #e94560;
            font-weight: bold;
        }
        .card .tier {
            display: inline-block;
            background: #e94560;
            color: white;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-top: 16px;
        }
        .card .hq {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Alexandria Sanctuary</h1>
        <div class="tagline">영적 케어 · 글로벌 영어 콘텐츠</div>
        <div class="info">
            <div><span>Type:</span> Vertical</div>
            <div><span>Domain:</span> alexandria-sanctuary</div>
            <div><span>Browser:</span> MS Edge</div>
            <div><span>Stack:</span> HTML / CSS / JS</div>
            <div><span>Hosting:</span> GitHub Pages</div>
        </div>
        <div class="tier">Tier 4 — Branch</div>
        <div class="hq">DTSLIB HQ · dtslib1979</div>
    </div>
</body>
</html>
